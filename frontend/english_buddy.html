<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Buddy — Spoken Practice</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surf: #1a1a22;
      --surf2: #22222e;
      --bdr: rgba(255, 255, 255, 0.07);
      --acc: #7c6af7;
      --acc2: #a78bfa;
      --txt: #e8e8f0;
      --mut: #6b6b80;
      --red: #f87171;
      --grn: #34d399;
      --yel: #fbbf24
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.1;
      pointer-events: none;
      z-index: 0
    }

    body::before {
      width: 500px;
      height: 500px;
      background: #7c6af7;
      top: -100px;
      left: -100px
    }

    body::after {
      width: 400px;
      height: 400px;
      background: #06b6d4;
      bottom: -80px;
      right: -80px
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 660px;
      padding: 24px 16px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
      text-align: center
    }

    h1 em {
      font-style: italic;
      color: var(--acc2)
    }

    .sub {
      font-size: 13px;
      color: var(--mut);
      text-align: center;
      margin-top: -10px
    }

    /* Profile panel — name only */
    .panel {
      width: 100%;
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: 14px;
      padding: 14px 16px
    }

    .panel h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--mut);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 12px
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 9px
    }

    .row:last-child {
      margin-bottom: 0
    }

    .row label {
      font-size: 12px;
      color: var(--mut);
      min-width: 96px
    }

    .row select,
    .row input[type=text] {
      flex: 1;
      background: var(--surf2);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      color: var(--txt);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      outline: none
    }

    .row select:focus,
    .row input:focus {
      border-color: var(--acc)
    }

    /* Topics */
    .pills {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center
    }

    .pill {
      font-size: 12px;
      padding: 6px 13px;
      border-radius: 100px;
      border: 1px solid var(--bdr);
      background: var(--surf);
      color: var(--mut);
      cursor: pointer;
      user-select: none;
      transition: all .15s
    }

    .pill:hover {
      border-color: var(--acc);
      color: var(--acc2)
    }

    .pill.on {
      background: rgba(124, 106, 247, .15);
      border-color: var(--acc);
      color: var(--acc2)
    }

    /* Avatar */
    .avbox {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px
    }

    #av {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c6af7, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: #fff;
      position: relative
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(167, 139, 250, .35);
      display: none;
      animation: rexp 2s ease-out infinite
    }

    .ring:nth-child(2) {
      animation-delay: .65s
    }

    .ring:nth-child(3) {
      animation-delay: 1.3s
    }

    @keyframes rexp {
      0% {
        width: 84px;
        height: 84px;
        opacity: .6
      }

      100% {
        width: 155px;
        height: 155px;
        opacity: 0
      }
    }

    #av.speaking .ring {
      display: block
    }

    #avname {
      font-size: 14px;
      font-weight: 500
    }

    #avst {
      font-size: 12px;
      color: var(--mut);
      min-height: 17px
    }

    #wave {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 28px;
      opacity: 0;
      transition: opacity .3s;
      margin-top: 4px
    }

    #wave.on {
      opacity: 1
    }

    #wave span {
      display: block;
      width: 4px;
      border-radius: 2px;
      background: var(--acc);
      animation: wb .7s ease-in-out infinite alternate
    }

    #wave span:nth-child(1) {
      animation-delay: .0s;
      height: 7px
    }

    #wave span:nth-child(2) {
      animation-delay: .1s;
      height: 18px
    }

    #wave span:nth-child(3) {
      animation-delay: .2s;
      height: 26px
    }

    #wave span:nth-child(4) {
      animation-delay: .3s;
      height: 13px
    }

    #wave span:nth-child(5) {
      animation-delay: .4s;
      height: 22px
    }

    #wave span:nth-child(6) {
      animation-delay: .5s;
      height: 10px
    }

    #wave span:nth-child(7) {
      animation-delay: .6s;
      height: 24px
    }

    #wave span:nth-child(8) {
      animation-delay: .3s;
      height: 16px
    }

    #wave span:nth-child(9) {
      animation-delay: .1s;
      height: 20px
    }

    #wave span:nth-child(10) {
      animation-delay: .2s;
      height: 8px
    }

    @keyframes wb {
      from {
        transform: scaleY(.3)
      }

      to {
        transform: scaleY(1)
      }
    }

    /* Transcript */
    #tx {
      width: 100%;
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: 14px;
      padding: 14px;
      min-height: 120px;
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    #tx::-webkit-scrollbar {
      width: 4px
    }

    #tx::-webkit-scrollbar-thumb {
      background: var(--bdr);
      border-radius: 2px
    }

    .bub {
      max-width: 86%;
      padding: 9px 13px;
      border-radius: 13px;
      font-size: 14px;
      line-height: 1.6;
      animation: pi .2s ease-out
    }

    @keyframes pi {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .bub.u {
      align-self: flex-end;
      background: rgba(124, 106, 247, .18);
      border: 1px solid rgba(124, 106, 247, .25);
      border-bottom-right-radius: 3px
    }

    .bub.a {
      align-self: flex-start;
      background: var(--surf2);
      border: 1px solid var(--bdr);
      border-bottom-left-radius: 3px
    }

    .bub.it {
      align-self: flex-end;
      background: transparent;
      border: 1px dashed rgba(124, 106, 247, .3);
      color: var(--mut);
      font-style: italic;
      border-bottom-right-radius: 3px
    }

    .bub.er {
      align-self: stretch;
      background: rgba(248, 113, 113, .1);
      border: 1px solid rgba(248, 113, 113, .3);
      color: var(--red);
      font-size: 12px;
      line-height: 1.6
    }

    #hint {
      color: var(--mut);
      font-size: 13px;
      text-align: center;
      margin: auto;
      line-height: 1.7
    }

    /* Mic */
    #mic {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 2px solid var(--bdr);
      background: var(--surf2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s
    }

    #mic:not(:disabled):hover {
      border-color: var(--acc);
      background: rgba(124, 106, 247, .1)
    }

    #mic.rec {
      border-color: var(--red);
      background: rgba(248, 113, 113, .1);
      animation: mg 1.2s ease-in-out infinite alternate
    }

    @keyframes mg {
      from {
        box-shadow: 0 0 0 0 rgba(248, 113, 113, .25)
      }

      to {
        box-shadow: 0 0 0 14px rgba(248, 113, 113, 0)
      }
    }

    #mic:disabled {
      opacity: .28;
      cursor: not-allowed
    }

    #mic svg {
      width: 30px;
      height: 30px;
      fill: none;
      stroke: var(--mut);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke .2s
    }

    #mic:not(:disabled):hover svg,
    #mic.rec svg {
      stroke: var(--red)
    }

    #mhint {
      font-size: 12px;
      color: var(--mut);
      text-align: center
    }

    /* Voice selector */
    .vrow {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--mut)
    }

    #vsel {
      background: var(--surf2);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      color: var(--txt);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 5px 8px;
      outline: none;
      max-width: 250px
    }

    /* Debug — hidden by default in prod, toggle with button */
    #dbg {
      width: 100%;
      background: #060609;
      border: 1px solid #1a1a2e;
      border-radius: 12px;
      overflow: hidden;
      display: none
    }

    #dbg.show {
      display: block
    }

    #dbgbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #1a1a2e;
      background: #0a0a12
    }

    #dbgbar span {
      font-size: 11px;
      color: #5555aa;
      font-family: monospace
    }

    #dbgbar button {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 5px;
      border: 1px solid #2a2a40;
      background: #111;
      color: #777;
      cursor: pointer
    }

    #dlog {
      height: 160px;
      overflow-y: auto;
      padding: 8px 12px;
      font-size: 11px;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      gap: 1px
    }

    #dlog::-webkit-scrollbar {
      width: 3px
    }

    #dlog::-webkit-scrollbar-thumb {
      background: #2a2a40;
      border-radius: 2px
    }

    .dl {
      color: #6666aa;
      padding: 1px 0
    }

    .dl.ok {
      color: #34d399
    }

    .dl.er {
      color: #f87171
    }

    .dl.wn {
      color: #fbbf24
    }

    .dl.if {
      color: #a78bfa
    }

    /* Debug toggle link */
    #dbgtoggle {
      font-size: 11px;
      color: var(--mut);
      cursor: pointer;
      opacity: .5;
      text-decoration: underline;
      text-underline-offset: 2px;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit
    }

    #dbgtoggle:hover {
      opacity: 1
    }
  </style>
</head>

<body>
  <div class="wrap">

    <h1>English <em>Buddy</em></h1>
    <p class="sub">Your spoken English practice partner</p>

    <!-- Profile — name and partner prefs only, no API key -->
    <div class="panel">
      <h3>Your profile</h3>
      <div class="row">
        <label>Your name</label>
        <input type="text" id="uname" placeholder="e.g. Kasun" maxlength="20">
      </div>
      <div class="row">
        <label>Partner name</label>
        <input type="text" id="pnameinput" placeholder="e.g. Alex, Sarah" maxlength="20" value="Alex">
        <select id="gendersel" style="max-width:100px">
          <option value="male">♂ Male</option>
          <option value="female">♀ Female</option>
        </select>
      </div>
    </div>

    <!-- Topics -->
    <div class="pills">
      <div class="pill on" data-t="free">Free chat</div>
      <div class="pill" data-t="cricket">Cricket</div>
      <div class="pill" data-t="food">Sri Lankan food</div>
      <div class="pill" data-t="travel">Travel</div>
      <div class="pill" data-t="work">Work &amp; career</div>
      <div class="pill" data-t="tech">Technology</div>
      <div class="pill" data-t="news">World news</div>
    </div>

    <!-- Avatar -->
    <div class="avbox">
      <div id="av" class="idle">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <span id="avltr">A</span>
      </div>
      <div id="avname">Alex</div>
      <div id="avst">Press the mic and start talking</div>
      <div id="wave">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Transcript -->
    <div id="tx">
      <div id="hint">Press the mic and start talking.<br>Alex will reply out loud.</div>
    </div>

    <!-- Mic — enabled immediately, no API key needed from user -->
    <button id="mic">
      <svg viewBox="0 0 24 24">
        <rect x="9" y="2" width="6" height="12" rx="3" />
        <path d="M5 10a7 7 0 0 0 14 0" />
        <line x1="12" y1="19" x2="12" y2="22" />
        <line x1="8" y1="22" x2="16" y2="22" />
      </svg>
    </button>
    <div id="mhint">Tap to speak · tap again when done</div>

    <!-- Voice selector -->
    <div class="vrow">
      <label for="vsel">Voice:</label>
      <select id="vsel"></select>
    </div>

    <!-- Debug toggle — hidden link, useful when troubleshooting -->
    <button id="dbgtoggle"
      onclick="document.getElementById('dbg').classList.toggle('show'); this.textContent=document.getElementById('dbg').classList.contains('show')?'hide debug':'debug'">debug</button>
    <div id="dbg">
      <div id="dbgbar">
        <span>🔍 Debug Log</span>
        <button onclick="document.getElementById('dlog').innerHTML=''">Clear</button>
      </div>
      <div id="dlog"></div>
    </div>

  </div>
  <script>
    // ── Platform detection ─────────────────────────────────────────────────────
    const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const IS_ANDROID = /Android/.test(navigator.userAgent);
    const IS_CHROME = /Chrome/.test(navigator.userAgent) && !/Edg/.test(navigator.userAgent);
    const IS_SAFARI = /Safari/.test(navigator.userAgent) && !IS_CHROME;
    const IS_MOBILE = IS_IOS || IS_ANDROID;
    const SILENCE_DELAY = 1500; // ms of silence before iOS auto-submits (1.5s feels natural)

    // Show iOS warning banner if on iPhone/iPad
    if (IS_IOS) {
      const w = document.createElement('div');
      w.style.cssText = 'width:100%;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.4);border-radius:12px;padding:12px 16px;font-size:13px;color:#fbbf24;text-align:center;line-height:1.6;margin-bottom:4px';
      w.innerHTML = '📱 You are on iOS — speak clearly and <strong>pause for 2 seconds</strong> to send.<br>For best experience use <strong>Chrome on Android or desktop</strong>.';
      document.querySelector('.wrap').insertBefore(w, document.querySelector('.wrap').children[2]);
    } else if (!IS_CHROME) {
      const w = document.createElement('div');
      w.style.cssText = 'width:100%;background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.4);border-radius:12px;padding:12px 16px;font-size:13px;color:#f87171;text-align:center;line-height:1.6;margin-bottom:4px';
      w.innerHTML = '⚠ Voice recognition works best in <strong>Google Chrome</strong>. Please switch to Chrome for the full experience.';
      document.querySelector('.wrap').insertBefore(w, document.querySelector('.wrap').children[2]);
    }

    // ── Prompts ────────────────────────────────────────────────────────────────
    const TOPICS = {
      free: 'You are {P}, a warm friendly funny English conversation partner chatting with {U}. React genuinely, ask one follow-up question. Reply in 1-3 short spoken sentences ONLY. No lists, no markdown.',
      cricket: 'You are {P}, a passionate cricket fan talking with {U}. Talk about cricket — teams, matches, players, World Cups. Ask one question back. 1-3 short sentences, casual.',
      food: 'You are {P}, someone who loves Sri Lankan food, chatting with {U}. Discuss kottu, hoppers, rice and curry, street food. 1-3 warm spoken sentences.',
      travel: 'You are {P}, a curious traveller chatting with {U}. Talk about travel in Sri Lanka and abroad. 1-3 casual sentences, ask one question.',
      work: 'You are {P}, a supportive friend chatting with {U} about work and careers. Encouraging tone. 1-3 conversational sentences.',
      tech: 'You are {P}, a tech enthusiast chatting with {U}. Discuss AI, apps, smartphones, coding. 1-3 spoken sentences.',
      news: 'You are {P}, a thoughtful friend discussing world news with {U}. Balanced, curious. Ask opinions. 1-3 casual sentences.'
    };

    // ── State ──────────────────────────────────────────────────────────────────
    let topic = 'free', history = [], recording = false, speaking = false;
    let finalTxt = '', interimTxt = '', ib = null, recog = null, voices = [];
    let silenceTimer = null, silenceAnimFrame = null, silenceStart = null;
    const $ = id => document.getElementById(id);

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const avEl = $('av'), avst = $('avst'), avltr = $('avltr'), avnameEl = $('avname');
    const waveEl = $('wave'), txEl = $('tx'), micEl = $('mic'), mhint = $('mhint');
    const vsel = $('vsel'), dlog = $('dlog');
    const unameEl = $('uname'), pnameEl = $('pnameinput'), genderEl = $('gendersel');

    // ── Helpers ────────────────────────────────────────────────────────────────
    function pname() { return pnameEl.value.trim() || 'Alex'; }
    function uname() { return unameEl.value.trim() || 'friend'; }
    function tpl(s) { return s.replace(/{P}/g, pname()).replace(/{U}/g, uname()); }

    function log(msg, cls = '') {
      const d = document.createElement('div');
      d.className = 'dl ' + cls;
      d.textContent = new Date().toLocaleTimeString() + ' ' + msg;
      dlog.appendChild(d); dlog.scrollTop = dlog.scrollHeight;
      console.log('[EB]', msg);
    }

    function toggleDbg() {
      $('dbg').classList.toggle('show');
    }

    // ── Persist user prefs (name only — no API keys) ──────────────────────────
    function loadPrefs() {
      unameEl.value = localStorage.getItem('eb_un') || '';
      pnameEl.value = localStorage.getItem('eb_pn') || 'Alex';
      genderEl.value = localStorage.getItem('eb_gd') || 'female';
      avltr.textContent = pname().charAt(0).toUpperCase();
      avnameEl.textContent = pname();
    }
    function savePrefs() {
      localStorage.setItem('eb_un', unameEl.value.trim());
      localStorage.setItem('eb_pn', pnameEl.value.trim());
      localStorage.setItem('eb_gd', genderEl.value);
      avltr.textContent = pname().charAt(0).toUpperCase();
      avnameEl.textContent = pname();
      pickVoiceForGender(genderEl.value);
    }
    // Auto-save prefs on any change
    [unameEl, pnameEl, genderEl].forEach(el => el.addEventListener('change', savePrefs));

    // ── Topics ─────────────────────────────────────────────────────────────────
    document.querySelectorAll('.pill').forEach(p => {
      p.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
        p.classList.add('on'); topic = p.dataset.t;
        history = [];
        speaking = false; window.speechSynthesis.cancel();
        avEl.className = 'idle';
        txEl.innerHTML = '<div id="hint" style="color:var(--mut);font-size:13px;text-align:center;margin:auto;line-height:1.7">Topic changed. Press mic to start.</div>';
        avst.textContent = 'Ready to chat';
        log('Topic: ' + topic, 'if');
      });
    });

    // ── Voices ─────────────────────────────────────────────────────────────────
    const EXCLUDED_VOICES = [
      'grandma', 'grandpa', 'junior', 'whisper', 'bahh', 'bells', 'boing',
      'bubbles', 'cellos', 'deranged', 'good news', 'hysterical', 'pipe organ',
      'trinoids', 'zarvox', 'albert', 'bad news', 'jester', 'kathy', 'ralph',
      'superstar', 'fred', 'bruce', 'organ'
    ];

    function fillVoices() {
      const all = window.speechSynthesis.getVoices();
      if (!all.length) return;
      // Filter: English only, exclude novelty/joke voices
      log('Voices available: ' + all.length + ' total from browser', 'if');
      const en = all.filter(v =>
        v.lang.startsWith('en') &&
        !EXCLUDED_VOICES.some(e => v.name.toLowerCase().includes(e))
      );
      log('After filtering: ' + en.length + ' English non-novelty voices', 'if');
      // Safety net: if filtering leaves nothing, use all English voices
      // If still nothing, use ALL voices (better than empty dropdown)
      if (en.length > 0) {
        voices = en;
      } else {
        const allEn = all.filter(v => v.lang.startsWith('en'));
        voices = allEn.length > 0 ? allEn : all;
        log('⚠ Using unfiltered voices — filtered list was empty', 'wn');
      }
      // Sort: Google US first, then US, then others
      voices.sort((a, b) => {
        const score = v => {
          if (v.name.toLowerCase().includes('google') && v.lang === 'en-US') return 0;
          if (v.lang === 'en-US') return 1;
          if (v.name.toLowerCase().includes('google')) return 2;
          if (v.lang.startsWith('en')) return 3;
          return 4;
        };
        return score(a) - score(b);
      });
      vsel.innerHTML = '';
      voices.forEach((v, i) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = v.name + (v.localService ? '' : ' ☁');
        vsel.appendChild(o);
      });
      pickVoiceForGender(genderEl.value || 'female');
      log('✓ Voices: ' + voices.length + ' — using: ' + voices[vsel.value]?.name, 'ok');
    }
    window.speechSynthesis.onvoiceschanged = fillVoices;
    fillVoices();
    setTimeout(fillVoices, 100);
    setTimeout(fillVoices, 500);
    setTimeout(fillVoices, 1000);
    setTimeout(fillVoices, 1500); // Extra retry for iOS — loads voices late
    setTimeout(fillVoices, 3000); // Final fallback for slow local environments

    function pickVoiceForGender(g) {
      if (!voices.length) return;
      const maleKw = ['david', 'mark', 'james', 'ryan', 'guy', 'george', 'richard', 'daniel', 'arthur', 'oliver', 'thomas'];
      const femaleKw = ['zira', 'samantha', 'karen', 'susan', 'linda', 'aria', 'jenny', 'natasha', 'moira', 'fiona', 'kate', 'victoria'];
      const kw = g === 'male' ? maleKw : femaleKw;

      // Priority 1: Google US English matching gender
      const p1 = voices.findIndex(v =>
        v.name.toLowerCase().includes('google') && v.lang === 'en-US' &&
        kw.some(k => v.name.toLowerCase().includes(k)));
      if (p1 >= 0) { vsel.value = p1; return; }

      // Priority 2: Any Google US English
      const p2 = voices.findIndex(v =>
        v.name.toLowerCase().includes('google') && v.lang === 'en-US');
      if (p2 >= 0) { vsel.value = p2; return; }

      // Priority 3: US English matching gender keywords
      const p3 = voices.findIndex(v =>
        v.lang === 'en-US' && kw.some(k => v.name.toLowerCase().includes(k)));
      if (p3 >= 0) { vsel.value = p3; return; }

      // Priority 4: Any US English
      const p4 = voices.findIndex(v => v.lang === 'en-US');
      if (p4 >= 0) { vsel.value = p4; return; }

      // Priority 5: Any English matching gender
      const p5 = voices.findIndex(v => kw.some(k => v.name.toLowerCase().includes(k)));
      if (p5 >= 0) { vsel.value = p5; return; }

      // Fallback: first voice
      if (voices.length) vsel.value = 0;
    }
    function getVoice() { return voices[parseInt(vsel.value)] || voices[0] || null; }

    // ── TTS ────────────────────────────────────────────────────────────────────
    function speak(text) {
      return new Promise(resolve => {
        window.speechSynthesis.cancel();
        // iOS needs a small delay after cancel before speaking
        setTimeout(() => {
          const u = new SpeechSynthesisUtterance(text);
          u.voice = getVoice();
          u.rate = IS_IOS ? 0.88 : 0.93; // Slightly slower on iOS
          u.pitch = 1.05; u.volume = 1;
          speaking = true; avEl.className = 'speaking';
          avst.textContent = 'Speaking…';
          log('🔊 ' + text.slice(0, 70) + (text.length > 70 ? '…' : ''), 'if');

          function onDone() {
            speaking = false; avEl.className = 'idle';
            avst.textContent = 'Your turn';
            log('✓ Done speaking', 'ok');
            resolve();
          }
          u.onend = onDone;
          u.onerror = e => { log('❌ TTS: ' + e.error, 'er'); speaking = false; avEl.className = 'idle'; resolve(); };

          // iOS Safari TTS keep-alive — prevents cutting off mid-sentence
          if (IS_IOS) {
            const iosTimer = setInterval(() => {
              if (!speaking) { clearInterval(iosTimer); return; }
              window.speechSynthesis.pause();
              window.speechSynthesis.resume();
            }, 10000);
            const origDone = onDone;
            u.onend = () => { clearInterval(iosTimer); origDone(); };
            u.onerror = e => { clearInterval(iosTimer); log('❌ TTS: ' + e.error, 'er'); speaking = false; avEl.className = 'idle'; resolve(); };
          }

          window.speechSynthesis.speak(u);
        }, IS_IOS ? 100 : 0);
      });
    }

    // ── iOS silence timer ─────────────────────────────────────────────────────
    // iOS doesn't reliably fire isFinal — auto-submit after 2s of silence
    function startSilenceTimer() {
      if (!IS_IOS) return;
      clearSilenceTimer();
      silenceStart = Date.now();
      silenceTimer = setTimeout(() => {
        // Grab everything — final + interim + whatever is in the bubble
        let text = (finalTxt + interimTxt).trim();
        // Last resort: read text directly from the interim bubble if still empty
        if (!text && ib) text = (ib.textContent || '').trim();
        log('⏱ iOS silence fired — finalTxt="' + finalTxt.trim() + '" interimTxt="' + interimTxt.trim() + '"', 'wn');
        log('⏱ Combined text: "' + text + '"', 'wn');
        if (recording && text) {
          finalTxt = text;
          interimTxt = '';
          stopRec();
        } else if (recording) {
          log('⏱ Nothing to submit — restarting mic', 'wn');
          try { recog.stop(); } catch (e) { }
          setTimeout(() => { try { recog.start(); } catch (e) { } }, 300);
        }
      }, SILENCE_DELAY);
    }

    function clearSilenceTimer() {
      clearTimeout(silenceTimer);
      cancelAnimationFrame(silenceAnimFrame);
      silenceTimer = null; silenceStart = null;
    }

    // ── AI call — no API key in browser, server handles it ─────────────────────
    async function aiReply(userText) {
      avst.textContent = 'Thinking…'; avEl.className = 'idle';
      history.push({ role: 'user', content: userText });
      const sys = tpl(TOPICS[topic]);
      log('→ Calling AI…', 'if');

      try {
        // POST to /proxy — server.py injects the API key server-side
        const r = await fetch('/proxy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: 'https://api.anthropic.com/v1/messages',
            headers: {
              'Content-Type': 'application/json',
              'anthropic-version': '2023-06-01'
              // x-api-key is injected by server.py — never in the browser
            },
            body: {
              model: 'claude-sonnet-4-5',
              max_tokens: 200,
              system: sys,
              messages: history
            }
          })
        });

        if (!r.ok) { const t = await r.text(); throw new Error('HTTP ' + r.status + ': ' + t.slice(0, 200)); }
        const d = await r.json();
        log('✓ Response: ' + JSON.stringify(d).slice(0, 120), 'ok');
        if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));

        let reply = (d.content?.[0]?.text || '').replace(/\*\*/g, '').replace(/\*/g, '').replace(/^[-•]\s/gm, '').trim();
        if (!reply) reply = 'Sorry, I missed that. Can you say it again?';

        history.push({ role: 'assistant', content: reply });
        addBubble(reply, 'a');
        await speak(reply);

      } catch (e) {
        log('❌ ERROR: ' + e.message, 'er');
        addBubble('⚠ ' + e.message, 'er');
        avst.textContent = 'Error'; avEl.className = 'idle';
      }
    }

    function addBubble(text, cls) {
      const h = document.getElementById('hint'); if (h) h.remove();
      const d = document.createElement('div');
      d.className = 'bub ' + cls; d.textContent = text;
      txEl.appendChild(d); txEl.scrollTop = txEl.scrollHeight;
    }

    // ── Speech recognition ─────────────────────────────────────────────────────
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      log('❌ SpeechRecognition not available', 'er');
      if (!IS_IOS) {
        addBubble('⚠ Please open this page in Google Chrome to use voice.', 'er');
        micEl.disabled = true;
      }
    } else {
      recog = new SR();
      recog.lang = 'en-US';
      recog.interimResults = true;
      recog.continuous = !IS_IOS; // iOS doesn't support continuous reliably
      recog.maxAlternatives = 1;

      recog.onstart = () => log('🎙 Mic started' + (IS_IOS ? ' (iOS mode)' : ''), 'ok');

      recog.onend = () => {
        log('Mic ended — finalTxt="' + finalTxt.trim() + '" interim="' + interimTxt.trim() + '"', '');
        if (recording) {
          if (IS_IOS) {
            // Grab everything available
            let combinedText = (finalTxt + interimTxt).trim();
            if (!combinedText && ib) combinedText = (ib.textContent || '').trim();

            if (combinedText) {
              log('iOS onend: submitting "' + combinedText + '"', 'ok');
              finalTxt = combinedText;
              interimTxt = '';
              stopRec();
            } else {
              // Nothing yet — restart mic and keep listening
              log('iOS onend: nothing captured, restarting', 'wn');
              try { recog.start(); }
              catch (e) { log('iOS restart err: ' + e.message, 'er'); }
            }
          } else {
            try { recog.start(); } catch (e) { }
          }
        }
      };

      recog.onerror = e => {
        log('❌ Mic error: ' + e.error, 'er');
        if (e.error === 'no-speech') {
          // iOS fires no-speech often — just restart quietly
          if (IS_IOS && recording) { try { recog.start(); } catch (err) { } }
          return;
        }
        if (e.error === 'not-allowed') addBubble('⚠ Microphone permission denied. Allow mic access and try again.', 'er');
        stopRec();
      };

      recog.onresult = e => {
        let interim = '';
        let newFinal = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            newFinal += e.results[i][0].transcript + ' ';
          } else {
            // On iOS, confidence > 0.7 is reliable enough to treat as final
            const conf = e.results[i][0].confidence;
            if (IS_IOS && conf > 0.7) {
              newFinal += e.results[i][0].transcript + ' ';
              log('iOS: high-confidence interim promoted to final (conf=' + conf.toFixed(2) + ')', 'ok');
            } else {
              interim = e.results[i][0].transcript;
            }
          }
        }
        if (newFinal) {
          finalTxt += newFinal;
          log('iOS: finalTxt now: "' + finalTxt.trim() + '"', 'if');
        }
        interimTxt = interim;

        const disp = (finalTxt + interim).trim();
        if (!ib) {
          const h = document.getElementById('hint'); if (h) h.remove();
          ib = document.createElement('div'); ib.className = 'bub it';
          txEl.appendChild(ib);
        }
        ib.textContent = disp || '…';
        txEl.scrollTop = txEl.scrollHeight;

        // iOS: restart silence timer on every new speech input
        if (IS_IOS) startSilenceTimer();
      };
    }

    function startRec() {
      if (speaking) { window.speechSynthesis.cancel(); speaking = false; }
      finalTxt = ''; interimTxt = ''; ib = null; recording = true;
      micEl.classList.add('rec'); waveEl.classList.add('on');
      avst.textContent = 'Listening…';
      mhint.textContent = IS_IOS
        ? 'Speak clearly — auto-sends after pause'
        : 'Listening — tap mic again when done';
      log('🎙 Starting mic…', 'if');
      try { recog.start(); } catch (e) { log('start() err: ' + e.message, 'er'); }
      // iOS: start silence timer immediately
      if (IS_IOS) startSilenceTimer();
    }

    function stopRec() {
      recording = false;
      micEl.classList.remove('rec'); waveEl.classList.remove('on');
      clearSilenceTimer();
      mhint.textContent = 'Tap to speak · tap again when done';
      try { recog.stop(); } catch (e) { }
      const text = finalTxt.trim();
      if (ib) { ib.remove(); ib = null; }
      finalTxt = ''; interimTxt = '';
      if (!text) { log('⚠ Nothing captured', 'wn'); avst.textContent = 'Ready — try again'; return; }
      log('🗣 You said: ' + text, 'if');
      addBubble(text, 'u');
      aiReply(text);
    }

    micEl.addEventListener('click', () => {
      if (!SR) { log('No SR available', 'er'); return; }
      log('Mic clicked — recording=' + recording, 'if');
      if (recording) stopRec(); else startRec();
    });

    // ── Init ───────────────────────────────────────────────────────────────────
    loadPrefs();
    log('── English Buddy ─────────────────────────', 'if');
    log('Platform: ' + (IS_IOS ? 'iOS' : IS_ANDROID ? 'Android' : 'Desktop') +
      ' | Browser: ' + (IS_CHROME ? 'Chrome' : IS_SAFARI ? 'Safari' : 'Other'), 'if');
    log('SpeechRecognition: ' + (SR ? '✓ Available' : '✗ Not available'), SR ? 'ok' : 'er');
    log('englishbuddy.live — talk to Alex!', 'ok');
  </script>
</body>

</html>
